<!DOCTYPE html>
<html>
<head>
    <title>Image Test</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1>Image Loading Test</h1>
        
        <div class="row">
            <div class="col-md-4">
                <div class="card">
                    <img src="/media/products/beef_steak_7.jpg" class="card-img-top" alt="Beef Steak" style="height: 200px; object-fit: cover;">
                    <div class="card-body">
                        <h5 class="card-title">Beef Steak</h5>
                        <p class="card-text">Test product</p>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card">
                    <img src="/media/products/spinach_7.jpg" class="card-img-top" alt="Spinach" style="height: 200px; object-fit: cover;">
                    <div class="card-body">
                        <h5 class="card-title">Spinach</h5>
                        <p class="card-text">Vegetable</p>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card">
                    <img src="/media/products/peaches_7.jpg" class="card-img-top" alt="Peaches" style="height: 200px; object-fit: cover;">
                    <div class="card-body">
                        <h5 class="card-title">Peaches</h5>
                        <p class="card-text">Fruit</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
